name: jepo
description: "Jepo - Proactive Assistance System"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.1
  image_picker:
  local_auth:
  package_info_plus:
  path_provider:
  permission_handler: ^12.0.1
  sensors_plus: ^7.0.0
  share_plus:
  shared_preferences:
  video_player:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/jepo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/jepo.png"
    background_color: "#hex_code"
    theme_color: "#hex_code"
  windows:
    generate: true
    image_path: "assets/jepo.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/jepo.png"

flutter:
  uses-material-design: true
