name: jepo
description: "Jepo - Proactive Assistance System"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^19.5.0
  flutter_phone_direct_caller: ^2.2.1
  geolocator: ^14.0.1
  http: ^1.2.0
  flutter_dotenv: ^5.0.2
  flutter_secure_storage: ^9.0.0
  image_picker:
  local_auth:
  package_info_plus:
  path_provider:
  permission_handler: ^12.0.1
  sensors_plus: ^7.0.0
  share_plus:
  shared_preferences:
  url_launcher: ^6.3.2
  video_player:
  google_fonts: ^8.1.0
  animations: ^2.2.0
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  mockito: ^5.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/jepo.png
    - .env
