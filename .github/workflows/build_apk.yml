name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean and Get Dependencies
        run: |
          flutter config --no-analytics
          flutter pub get

      - name: Run Build Script (build_apk.ps1)
        # We run the user's PowerShell script directly as requested.
        # This script handles gradle stop, clean, build, and copying the APK.
        shell: powershell
        run: .\build_apk.ps1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: jepo-apk
          path: jepo.apk
          retention-days: 7
